[build]
publish = "."

[[headers]]
for = "/*.html"
[headers.values]
Cache-Control = "no-cache"

[[headers]]
for = "/*.css"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.js"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/Images/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
